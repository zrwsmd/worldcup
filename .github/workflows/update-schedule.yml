name: 更新世界杯赛程数据

on:
  schedule:
    # 每3小时执行一次（UTC时间）
    - cron: '0 */3 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许提交和推送代码

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 下载最新赛程数据
        run: |
          curl -o worldcup2026.json https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json

      - name: 转换数据格式
        run: |
          node convert_schedule.js > schedule_data_new.js

      - name: 检查是否有数据更新
        id: check_changes
        run: |
          # 提取index.html中的scheduleData部分
          sed -n '/const scheduleData = \[/,/^];$/p' index.html > schedule_data_old.js

          # 比较新旧数据
          if ! diff -q schedule_data_old.js schedule_data_new.js > /dev/null 2>&1; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "检测到数据变化"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "数据无变化"
          fi

      - name: 更新index.html
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # 备份原文件
          cp index.html index.html.bak

          # 找到scheduleData的起始和结束行号
          start_line=$(grep -n "const scheduleData = \[" index.html | cut -d: -f1)
          end_line=$(grep -n "^];" index.html | tail -1 | cut -d: -f1)

          # 分割文件并插入新数据
          head -n $((start_line - 1)) index.html > index.html.tmp
          cat schedule_data_new.js >> index.html.tmp
          tail -n +$((end_line + 1)) index.html >> index.html.tmp

          # 替换原文件
          mv index.html.tmp index.html

          echo "数据已更新"

      - name: 提交更改
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html worldcup2026.json
          git commit -m "chore: 自动更新世界杯赛程数据 $(date +'%Y-%m-%d %H:%M')"
          git push
