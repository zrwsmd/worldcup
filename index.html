<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026世界杯球星阵容展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0a4d2e 0%, #1a7a3e 50%, #0f5c35 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            animation: fadeInDown 1s;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            color: #ffd700;
        }

        .today-matches {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            max-width: 1200px;
            backdrop-filter: blur(10px);
        }

        .today-matches-title {
            font-size: 1.5em;
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .matches-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            min-width: 300px;
            transition: all 0.3s;
        }

        .match-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffd700;
            transform: translateY(-3px);
        }

        .match-teams {
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #fff;
        }

        .match-vs {
            color: #ffd700;
            margin: 0 10px;
        }

        .match-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .match-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.9);
        }

        .match-info-icon {
            font-size: 1.1em;
        }

        .team-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .team-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .team-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .team-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-color: #ffd700;
            color: #000;
            font-weight: bold;
        }

        .team-btn.hidden {
            display: none;
        }

        .filter-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: rgba(255, 215, 0, 0.4);
            border-color: #ffd700;
            color: #ffd700;
            font-weight: bold;
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .search-input {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: #fff;
            font-size: 1em;
            width: 300px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffd700;
        }

        .pitch-container {
            background: linear-gradient(180deg,
                rgba(10, 120, 50, 0.9) 0%,
                rgba(15, 100, 45, 0.9) 50%,
                rgba(10, 120, 50, 0.9) 100%);
            border-radius: 20px;
            padding: 40px;
            margin: 30px auto;
            max-width: 900px;
            position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .pitch-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
        }

        .pitch-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .formation-title {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .pitch-line {
            display: flex;
            justify-content: space-around;
            margin: 40px 0;
            position: relative;
            z-index: 1;
        }

        .player-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5));
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px 20px;
            text-align: center;
            min-width: 160px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            position: relative;
            animation: playerEntrance 0.8s ease-out;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .player-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #000;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            overflow: hidden;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .player-avatar-fallback {
            font-size: 1.8em;
            font-weight: bold;
            color: #000;
        }

        .player-name-en {
            font-size: 0.75em;
            color: #888;
            margin-top: 3px;
            font-style: italic;
        }

        .player-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
            border-color: #fff;
        }

        .player-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .player-name {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .player-position {
            font-size: 0.9em;
            color: #aaa;
            text-transform: uppercase;
        }

        .player-club {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }

        .coach-section {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto 40px;
            max-width: 900px;
        }

        .coach-section-title {
            text-align: center;
            color: #ffd700;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        .coach-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5));
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 30px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }

        .coach-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
            border-color: #fff;
        }

        .coach-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            color: #000;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
            overflow: hidden;
            flex-shrink: 0;
        }

        .coach-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .coach-info {
            flex: 1;
            text-align: left;
        }

        .coach-name {
            font-size: 1.6em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .coach-name-en {
            font-size: 1em;
            color: #aaa;
            font-style: italic;
            margin-bottom: 10px;
        }

        .coach-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .coach-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.95em;
            color: #ccc;
        }

        .coach-intro-brief {
            font-size: 0.95em;
            color: #bbb;
            line-height: 1.5;
            margin-top: 10px;
        }

        .substitutes-section {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin: 30px auto;
            max-width: 900px;
            border: 2px solid rgba(255, 215, 0, 0.25);
        }

        .substitutes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 10px 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            transition: all 0.3s;
        }

        .substitutes-header:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .substitutes-title {
            font-size: 1.5em;
            color: #ffd700;
            font-weight: bold;
        }

        .substitutes-toggle {
            font-size: 1.5em;
            color: #ffd700;
            transition: transform 0.3s;
        }

        .substitutes-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .substitutes-content {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }

        .substitutes-content.expanded {
            max-height: 2000px;
        }

        .substitute-card {
            background: linear-gradient(135deg, rgba(50, 50, 50, 0.7), rgba(30, 30, 30, 0.5));
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 12px;
            padding: 12px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
        }

        .substitute-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            border-color: #ffd700;
        }

        .substitute-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin: 0 auto 8px;
            background: linear-gradient(135deg, #888, #666);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
            border: 2px solid rgba(255, 215, 0, 0.3);
            overflow: hidden;
        }

        .substitute-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .substitute-number {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 3px;
        }

        .substitute-name {
            font-size: 0.95em;
            font-weight: bold;
            margin-bottom: 3px;
            color: #fff;
        }

        .substitute-name-en {
            font-size: 0.7em;
            color: #888;
            font-style: italic;
            margin-bottom: 3px;
        }

        .substitute-position {
            font-size: 0.8em;
            color: #aaa;
        }

        .team-info {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin: 30px auto;
            max-width: 900px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .team-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .match-preview {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin: 30px auto;
            max-width: 1200px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .match-preview h2 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 25px;
            font-size: 2em;
        }

        .vs-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
        }

        .team-preview {
            text-align: center;
            flex: 1;
        }

        .team-flag {
            font-size: 5em;
            margin-bottom: 15px;
        }

        .team-name-large {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }

        .vs-text {
            font-size: 3em;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes playerEntrance {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .gk { background: #ff6b6b; }
        .def { background: #4ecdc4; }
        .mid { background: #45b7d1; }
        .fwd { background: #f9ca24; }

        /* 球员详情模态框 */
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .player-modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(15, 100, 45, 0.95), rgba(10, 80, 40, 0.95));
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 3px solid #ffd700;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #fff;
            transition: all 0.3s;
            z-index: 10;
        }

        .modal-close:hover {
            background: rgba(255, 0, 0, 0.5);
            border-color: #ff0000;
            transform: rotate(90deg);
        }

        .modal-header {
            padding: 40px 30px 30px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }

        .modal-player-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 5px solid #ffd700;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.5);
        }

        .modal-player-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .modal-player-name {
            font-size: 2.5em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .modal-player-name-en {
            font-size: 1.2em;
            color: #ccc;
            font-style: italic;
            margin-bottom: 20px;
        }

        .modal-player-basics {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .modal-basic-item {
            text-align: center;
        }

        .modal-basic-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .modal-basic-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffd700;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-section {
            margin-bottom: 30px;
        }

        .modal-section-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #ffd700;
            border-radius: 2px;
        }

        .modal-intro {
            font-size: 1.1em;
            line-height: 1.8;
            color: #fff;
            text-align: justify;
        }

        .modal-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 215, 0, 0.1));
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 25px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s;
        }

        .skill-tag:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.5), rgba(255, 215, 0, 0.3));
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .modal-achievements {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .achievement-item {
            padding: 12px 18px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            border-left: 4px solid #ffd700;
            border-radius: 8px;
            color: #ddd;
            font-size: 1em;
            line-height: 1.6;
            transition: all 0.3s;
        }

        .achievement-item:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.25), rgba(255, 215, 0, 0.15));
            transform: translateX(5px);
            border-left-width: 6px;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .modal-stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .modal-stat-item:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            transform: translateY(-5px);
        }

        .modal-stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
        }

        .modal-stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }

        @media (max-width: 768px) {
            .modal-content {
                max-width: 95%;
            }

        function filterTeams(category) {
            // 更新筛选按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 清空搜索框
            const searchInput = document.querySelector('.search-input');
            if (searchInput) searchInput.value = '';

            // 获取所有球队按钮
            const teamButtons = document.querySelectorAll('.team-btn');

            if (category === 'all') {
                // 显示所有球队
                teamButtons.forEach(btn => btn.classList.remove('hidden'));
            } else {
                // 根据分类筛选
                teamButtons.forEach(btn => {
                    const categories = btn.getAttribute('data-category') || '';
                    if (categories.includes(category)) {
                        btn.classList.remove('hidden');
                    } else {
                        btn.classList.add('hidden');
                    }
                });
            }
        }

        function searchTeams(keyword) {
            // 如果搜索框有内容，清除分类筛选状态
            if (keyword.trim()) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            }

            const teamButtons = document.querySelectorAll('.team-btn');
            const searchText = keyword.trim().toLowerCase();

            if (!searchText) {
                // 如果搜索框为空，恢复到"全部"状态
                teamButtons.forEach(btn => btn.classList.remove('hidden'));
                document.querySelector('.filter-btn').classList.add('active');
                return;
            }

            // 根据搜索关键词筛选
            teamButtons.forEach(btn => {
                const teamName = btn.textContent.toLowerCase();
                if (teamName.includes(searchText)) {
                    btn.classList.remove('hidden');
                } else {
                    btn.classList.add('hidden');
                }
            });
        }

        const imageCache = {};

        async function fetchWikiImage(playerName) {
            if (imageCache[playerName]) return imageCache[playerName];
            const title = wikiTitles[playerName];
            if (!title) {
                console.log(`❌ 未找到维基标题: ${playerName}`);
                return null;
            }
            try {
                const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=250&format=json&origin=*&redirects=1`;
                const res = await fetch(url);
                const data = await res.json();
                const pages = data.query.pages;
                for (const page of Object.values(pages)) {
                    const src = page?.thumbnail?.source;
                    if (src) {
                        imageCache[playerName] = src;
                        console.log(`✅ 成功加载: ${playerName} - ${title}`);
                        return src;
                    }
                }
                console.log(`⚠️ 无照片: ${playerName} - ${title}`);
            } catch(e) {
                console.log(`❌ 加载失败: ${playerName} - ${e.message}`);
            }
            return null;
        }

        async function loadAvatars() {
            const imgs = document.querySelectorAll('.player-avatar img[data-player], .substitute-avatar img[data-player]');
            console.log(`🔄 开始加载 ${imgs.length} 个球员头像...`);

            // 逐个加载，每次请求间隔 300ms，避免 429 错误
            for (const img of imgs) {
                const name = img.getAttribute('data-player');
                const src = await fetchWikiImage(name);
                const isSubstitute = img.parentElement.classList.contains('substitute-avatar');
                const defaultGradient = isSubstitute ?
                    'linear-gradient(135deg,#888,#666)' :
                    'linear-gradient(135deg,#ffd700,#ffed4e)';

                if (src) {
                    img.src = src;
                    img.style.display = '';
                    img.onload = () => img.parentElement.classList.add('loaded');
                    img.onerror = () => {
                        img.parentElement.style.background = defaultGradient;
                        img.style.display = 'none';
                        img.parentElement.classList.add('loaded');
                    };
                } else {
                    img.parentElement.style.background = defaultGradient;
                    img.style.display = 'none';
                    img.parentElement.classList.add('loaded');
                }
                // 延迟 300ms 再加载下一个球员，避免请求过快
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            console.log(`✅ 头像加载完成`);
        }

        // UTC时差偏移字符串 -> 数字小时
        function parseUTCOffset(timeStr) {
            // e.g. "13:00 UTC-6" -> offset = -6
            const m = timeStr.match(/UTC([+-]\d+)/);
            return m ? parseInt(m[1]) : 0;
        }

        // 将比赛时间转为北京时间（UTC+8）
        function convertToBeiJing(dateStr, timeStr) {
            if (!timeStr) return '时间待定';
            try {
                const timePart = timeStr.split(' ')[0]; // "13:00"
                const [h, min] = timePart.split(':').map(Number);
                const utcOffset = parseUTCOffset(timeStr);
                // 转成UTC小时
                const utcHour = h - utcOffset;
                // 北京 = UTC+8
                let bjHour = utcHour + 8;
                // 处理跨天
                let dayOffset = 0;
                if (bjHour >= 24) { bjHour -= 24; dayOffset = 1; }
                if (bjHour < 0)   { bjHour += 24; dayOffset = -1; }
                return `北京时间 ${String(bjHour).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
            } catch(e) {
                return timeStr;
            }
        }

        // 用 openfootball 公开 JSON 获取当日比赛（无需 API key）
        async function getTodayMatches() {
            try {
                const today = new Date();
                const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

                const url = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('fetch failed');
                const data = await resp.json();

                const allMatches = data.matches || [];
                const todayMatches = allMatches.filter(m => m.date === dateStr);

                return todayMatches.map(m => {
                    const flag1 = TEAM_FLAGS[m.team1] || '';
                    const flag2 = TEAM_FLAGS[m.team2] || '';
                    const teamName1 = TEAM_NAMES_CN[m.team1] || m.team1;
                    const teamName2 = TEAM_NAMES_CN[m.team2] || m.team2;
                    const venueName = VENUE_NAMES_CN[m.ground] || m.ground || '待定';
                    const score = (m.score1 != null && m.score2 != null)
                        ? ` ${m.score1} - ${m.score2} ` : ' VS ';
                    return {
                        homeTeam: `${flag1} ${teamName1}`,
                        awayTeam: `${flag2} ${teamName2}`,
                        score: score,
                        time: convertToBeiJing(m.date, m.time),
                        venue: venueName,
                        group: m.group || m.round || '淘汰赛',
                        finished: !!m.finished,
                    };
                });
            } catch(e) {
                console.error('赛程获取失败:', e);
                return [];
            }
        }

        // 视图切换函数
        function switchView(view) {
            const lineupContainer = document.getElementById('lineupContainer');
            const scheduleContainer = document.getElementById('scheduleContainer');
            const standingsContainer = document.getElementById('standingsContainer');
            const bracketContainer = document.getElementById('bracketContainer');
            const buttons = document.querySelectorAll('.view-toggle-btn');

            if (view === 'lineup') {
                lineupContainer.style.display = 'block';
                scheduleContainer.classList.remove('active');
                standingsContainer.classList.remove('active');
                bracketContainer.classList.remove('active');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
                buttons[2].classList.remove('active');
                buttons[3].classList.remove('active');
            } else if (view === 'schedule') {
                lineupContainer.style.display = 'none';
                scheduleContainer.classList.add('active');
                standingsContainer.classList.remove('active');
                bracketContainer.classList.remove('active');
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
                buttons[2].classList.remove('active');
                buttons[3].classList.remove('active');
                renderSchedule('all');
            } else if (view === 'standings') {
                lineupContainer.style.display = 'none';
                scheduleContainer.classList.remove('active');
                standingsContainer.classList.add('active');
                bracketContainer.classList.remove('active');
                buttons[0].classList.remove('active');
                buttons[1].classList.remove('active');
                buttons[2].classList.add('active');
                buttons[3].classList.remove('active');
                renderStandings();
            } else if (view === 'bracket') {
                lineupContainer.style.display = 'none';
                scheduleContainer.classList.remove('active');
                standingsContainer.classList.remove('active');
                bracketContainer.classList.add('active');
                buttons[0].classList.remove('active');
                buttons[1].classList.remove('active');
                buttons[2].classList.remove('active');
                buttons[3].classList.add('active');
                renderBracket();
            }
        }

        // 赛程筛选函数
        function filterSchedule(stage) {
            const buttons = document.querySelectorAll('.stage-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderSchedule(stage);
        }

        // 渲染赛程表
        function renderSchedule(stage) {
            const scheduleContent = document.getElementById('scheduleContent');
            const filteredMatches = stage === 'all'
                ? scheduleData
                : scheduleData.filter(match => match.stage === stage);

            // 按日期分组
            const matchesByDate = {};
            filteredMatches.forEach(match => {
                if (!matchesByDate[match.date]) {
                    matchesByDate[match.date] = [];
                }
                matchesByDate[match.date].push(match);
            });

            // 生成HTML
            let html = '';
            Object.keys(matchesByDate).sort().forEach(date => {
                const dateObj = new Date(date + 'T00:00:00');
                const dateStr = `${dateObj.getMonth() + 1}月${dateObj.getDate()}日 ${['周日','周一','周二','周三','周四','周五','周六'][dateObj.getDay()]}`;

                html += `<div class="schedule-date-group">`;
                html += `<div class="schedule-date-title">📅 ${dateStr}</div>`;
                html += `<div class="schedule-matches">`;

                matchesByDate[date].forEach(match => {
                    const scoreOrVs = match.score
                        ? `<span class="schedule-match-score">${match.score}</span>`
                        : `<span class="schedule-match-vs">VS</span>`;
                    const cardClass = match.score ? 'schedule-match-card schedule-match-finished' : 'schedule-match-card';

                    html += `
                        <div class="${cardClass}">
                            <div class="schedule-match-time">⏰ 北京时间 ${match.time}</div>
                            <div class="schedule-match-teams">
                                ${match.homeTeam}
                                ${scoreOrVs}
                                ${match.awayTeam}
                            </div>
                            <div class="schedule-match-info">
                                <div class="schedule-match-info-item">
                                    <span class="schedule-match-icon">🏟️</span>
                                    <span>${match.venue}</span>
                                </div>
                                <div class="schedule-match-info-item">
                                    <span class="schedule-match-icon">📊</span>
                                    <span>${match.group}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            scheduleContent.innerHTML = html;
        }

        // 计算积分榜
        function calculateStandings() {
            const groups = {};
            const groupNames = ['A组', 'B组', 'C组', 'D组', 'E组', 'F组', 'G组', 'H组', 'I组', 'J组', 'K组', 'L组'];

            // 初始化各组
            groupNames.forEach(group => {
                groups[group] = {};
            });

            // 筛选小组赛已完赛的比赛
            const groupMatches = scheduleData.filter(match =>
                match.stage === 'group' && match.score !== null
            );

            // 统计每场比赛
            groupMatches.forEach(match => {
                const [homeScore, awayScore] = match.score.split('-').map(Number);
                const homeTeam = match.homeTeam;
                const awayTeam = match.awayTeam;
                const group = match.group;

                // 初始化队伍数据
                if (!groups[group][homeTeam]) {
                    groups[group][homeTeam] = {
                        team: homeTeam,
                        played: 0,
                        won: 0,
                        drawn: 0,
                        lost: 0,
                        goalsFor: 0,
                        goalsAgainst: 0,
                        goalDifference: 0,
                        points: 0
                    };
                }
                if (!groups[group][awayTeam]) {
                    groups[group][awayTeam] = {
                        team: awayTeam,
                        played: 0,
                        won: 0,
                        drawn: 0,
                        lost: 0,
                        goalsFor: 0,
                        goalsAgainst: 0,
                        goalDifference: 0,
                        points: 0
                    };
                }

                // 更新主队数据
                groups[group][homeTeam].played++;
                groups[group][homeTeam].goalsFor += homeScore;
                groups[group][homeTeam].goalsAgainst += awayScore;

                // 更新客队数据
                groups[group][awayTeam].played++;
                groups[group][awayTeam].goalsFor += awayScore;
                groups[group][awayTeam].goalsAgainst += homeScore;

                // 判断胜负
                if (homeScore > awayScore) {
                    groups[group][homeTeam].won++;
                    groups[group][homeTeam].points += 3;
                    groups[group][awayTeam].lost++;
                } else if (homeScore < awayScore) {
                    groups[group][awayTeam].won++;
                    groups[group][awayTeam].points += 3;
                    groups[group][homeTeam].lost++;
                } else {
                    groups[group][homeTeam].drawn++;
                    groups[group][awayTeam].drawn++;
                    groups[group][homeTeam].points += 1;
                    groups[group][awayTeam].points += 1;
                }

                // 计算净胜球
                groups[group][homeTeam].goalDifference = groups[group][homeTeam].goalsFor - groups[group][homeTeam].goalsAgainst;
                groups[group][awayTeam].goalDifference = groups[group][awayTeam].goalsFor - groups[group][awayTeam].goalsAgainst;
            });

            // 对每组进行排序
            Object.keys(groups).forEach(group => {
                groups[group] = Object.values(groups[group]).sort((a, b) => {
                    if (b.points !== a.points) return b.points - a.points;
                    if (b.goalDifference !== a.goalDifference) return b.goalDifference - a.goalDifference;
                    if (b.goalsFor !== a.goalsFor) return b.goalsFor - a.goalsFor;
                    return 0;
                });
            });

            return groups;
        }

        // 渲染积分榜
        function renderStandings() {
            const standingsContent = document.getElementById('standingsContent');
            const standings = calculateStandings();
            const groupNames = ['A组', 'B组', 'C组', 'D组', 'E组', 'F组', 'G组', 'H组', 'I组', 'J组', 'K组', 'L组'];

            let html = '';

            groupNames.forEach(groupName => {
                const teams = standings[groupName];

                if (!teams || teams.length === 0) return;

                html += `
                    <div class="standings-group">
                        <div class="standings-group-title">${groupName}</div>
                        <div class="standings-table">
                            <table>
                                <thead>
                                    <tr>
                                        <th>排名</th>
                                        <th>队伍</th>
                                        <th>场次</th>
                                        <th>胜</th>
                                        <th>平</th>
                                        <th>负</th>
                                        <th>进球</th>
                                        <th>失球</th>
                                        <th>净胜球</th>
                                        <th>积分</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;

                teams.forEach((team, index) => {
                    const rank = index + 1;
                    const qualifiedClass = rank <= 2 ? 'qualified' : '';

                    html += `
                        <tr class="${qualifiedClass}">
                            <td class="rank-cell">${rank}</td>
                            <td class="team-cell">${team.team}</td>
                            <td>${team.played}</td>
                            <td>${team.won}</td>
                            <td>${team.drawn}</td>
                            <td>${team.lost}</td>
                            <td>${team.goalsFor}</td>
                            <td>${team.goalsAgainst}</td>
                            <td>${team.goalDifference > 0 ? '+' : ''}${team.goalDifference}</td>
                            <td><strong>${team.points}</strong></td>
                        </tr>
                    `;
                });

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });

            standingsContent.innerHTML = html;
        }

                const response = await fetch(dataUrl, {
                    headers: { 'User-Agent': 'Mozilla/5.0 (WorldCupBracketBot/1.0)' }
                });
                const data = await response.json();
                localStorage.setItem(cacheKey, JSON.stringify(data));
                console.log('✓ 已从网络获取最新赛程数据');
                return data;
            } catch (error) {
                console.warn('⚠ 网络获取失败，尝试使用本地缓存...', error);
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    console.log('✓ 已使用本地缓存数据（可能不是最新）');
                    return JSON.parse(cached);
                } else {
                    console.error('✗ 没有可用的本地缓存');
                    throw new Error('无法获取数据');
                }
            }
        }

        // 判断比赛胜者
        function matchWinner(m) {
            const score = m.score;
            if (!score) return null;

            const team1 = m.team1;
            const team2 = m.team2;
            if (!team1 || !team2) return null;

            // 占位符还没解析出真实队伍
            if ((team1.startsWith('W') && /^\d+$/.test(team1.substring(1))) ||
                (team1.startsWith('L') && /^\d+$/.test(team1.substring(1))) ||
                (team2.startsWith('W') && /^\d+$/.test(team2.substring(1))) ||
                (team2.startsWith('L') && /^\d+$/.test(team2.substring(1)))) {
                return null;
            }

            // 点球大战
            if (score.p) {
                const [p1, p2] = score.p;
                return p1 > p2 ? team1 : team2;
            }
            // 加时赛
            if (score.et) {
                const [e1, e2] = score.et;
                if (e1 !== e2) {
                    return e1 > e2 ? team1 : team2;
                }
            }
            // 常规时间
            if (score.ft) {
                const [f1, f2] = score.ft;
                if (f1 !== f2) {
                    return f1 > f2 ? team1 : team2;
                }
            }
            return null;
        }

        // 判断比赛负者（用于季军赛）
        function matchLoser(m) {
            const winner = matchWinner(m);
            if (winner === null) return null;
            return winner === m.team1 ? m.team2 : m.team1;
        }

        // 解析占位符
        function resolvePlaceholders(matchesByNum) {
            let changed = true;
            let rounds = 0;

            while (changed && rounds < 10) {
                changed = false;
                rounds++;

                for (const [num, m] of Object.entries(matchesByNum)) {
                    for (const key of ['team1', 'team2']) {
                        const val = m[key];
                        if (!val) continue;

                        if (val.startsWith('W') && /^\d+$/.test(val.substring(1))) {
                            const refNum = parseInt(val.substring(1));
                            const refMatch = matchesByNum[refNum];
                            if (refMatch) {
                                const winner = matchWinner(refMatch);
                                if (winner) {
                                    m[key] = winner;
                                    changed = true;
                                }
                            }
                        } else if (val.startsWith('L') && /^\d+$/.test(val.substring(1))) {
                            const refNum = parseInt(val.substring(1));
                            const refMatch = matchesByNum[refNum];
                            if (refMatch) {
                                const loser = matchLoser(refMatch);
                                if (loser) {
                                    m[key] = loser;
                                    changed = true;
                                }
                            }
                        }
                    }
                }
            }

            return matchesByNum;
        }

        // 获取显示标签
        function teamLabel(team, num, slot) {
            if (!team) return '待定';
            if (team.startsWith('W') && /^\d+$/.test(team.substring(1))) {
                return `第${team.substring(1)}场胜者`;
            }
            if (team.startsWith('L') && /^\d+$/.test(team.substring(1))) {
                return `第${team.substring(1)}场负者`;
            }
            return cnName(team);
        }

        // 获取比分字符串
        function matchScoreStr(m) {
            const sc = m.score;
            if (!sc) return { sc1: null, sc2: null, note: null };

            let sc1 = null, sc2 = null, note = null;

            if (sc.ft) {
                [sc1, sc2] = sc.ft;
            }
            if (sc.et && (!sc.ft || JSON.stringify(sc.et) !== JSON.stringify(sc.ft))) {
                [sc1, sc2] = sc.et;
                note = '加时';
            }
            if (sc.p) {
                const [p1, p2] = sc.p;
                note = `点球 ${p1}-${p2}`;
            }

            return { sc1, sc2, note };
        }

        // 判断比赛是否结束
        function isMatchDone(m) {
            return matchWinner(m) !== null || (m.score && m.score.ft);
        }

        // 渲染淘汰赛对阵图
        async function renderBracket() {
            const bracketContent = document.getElementById('bracketContent');
            const bracketDataDate = document.getElementById('bracketDataDate');

            bracketContent.innerHTML = '<div style="text-align:center; padding:50px; color:#ffd700;">数据加载中...</div>';

            try {
                const data = await fetchBracketData();
                const matches = data.matches;

                // 给每场比赛编号
                matches.forEach((m, i) => {
                    m._num = i + 1;
                });

                // 构建编号索引
                const matchesByNum = {};
                matches.forEach(m => {
                    matchesByNum[m._num] = m;
                });

                // 解析占位符
                resolvePlaceholders(matchesByNum);

                // 按轮次分组
                const KO_ROUNDS = ['Round of 32', 'Round of 16', 'Quarter-final', 'Semi-final', 'Match for third place', 'Final'];
                const bracket = {};
                KO_ROUNDS.forEach(r => {
                    bracket[r] = matches.filter(m => m.round === r);
                });

                // 更新日期
                const today = new Date().toISOString().split('T')[0];
                bracketDataDate.textContent = `数据截至 ${today} · 数据来源 openfootball/worldcup.json`;

                // 绘制SVG
                drawBracketSVG(bracket, bracketContent);

            } catch (error) {
                bracketContent.innerHTML = `<div style="text-align:center; padding:50px; color:#ff6b6b;">数据加载失败: ${error.message}</div>`;
            }
        }

        // 绘制SVG对阵图
        function drawBracketSVG(bracket, container) {
            const r32 = bracket['Round of 32'] || [];
            const r16 = bracket['Round of 16'] || [];
            const qf = bracket['Quarter-final'] || [];
            const sf = bracket['Semi-final'] || [];
            const final = bracket['Final'] ? bracket['Final'][0] : null;
            const third = bracket['Match for third place'] ? bracket['Match for third place'][0] : null;

            if (r32.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px; color:#ffd700;">淘汰赛数据尚未生成</div>';
                return;
            }

            const svgWidth = 1600;
            const svgHeight = 950;
            const cardW = 168;
            const cardH = 54;
            const topMargin = 180;
            const bottomMargin = 40;
            const usableH = svgHeight - topMargin - bottomMargin;

            // 列x坐标
            const colWidth = 190;
            const startXLeft = 40;
            const colX = [];
            for (let i = 0; i < 5; i++) {
                colX[i] = startXLeft + i * colWidth + cardW / 2;
            }
            const finalX = colX[4];
            const colXRight = [];
            for (let i = 0; i < 4; i++) {
                colXRight[i] = svgWidth - (startXLeft + i * colWidth + cardW / 2);
            }

            let svg = `<svg width="${svgWidth}" height="${svgHeight}" xmlns="http://www.w3.org/2000/svg">`;

            // 背景渐变
            svg += `
                <defs>
                    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:rgb(10,77,46);stop-opacity:1" />
                        <stop offset="50%" style="stop-color:rgb(15,92,53);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:rgb(15,92,53);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect width="${svgWidth}" height="${svgHeight}" fill="url(#bgGradient)"/>
            `;

            // 绘制比赛卡片函数
            function drawMatchCard(cx, cy, m, w = cardW, h = cardH) {
                const t1 = m.team1;
                const t2 = m.team2;
                const num = m._num;
                const l1 = teamLabel(t1, num, 'team1');
                const l2 = teamLabel(t2, num, 'team2');
                const { sc1, sc2, note } = matchScoreStr(m);
                const done = sc1 !== null;

                const x0 = cx - w / 2;
                const y0 = cy - h / 2;
                const border = done ? '#ffd700' : '#2e8b57';
                const borderWidth = done ? 1.6 : 1.0;

                let card = `<g>`;
                card += `<rect x="${x0}" y="${y0}" width="${w}" height="${h}" rx="6" fill="#073520" stroke="${border}" stroke-width="${borderWidth}"/>`;

                // 场次和日期
                card += `<text x="${x0 + 5}" y="${y0 + h - 9}" font-size="7" fill="#cfe8d8" font-family="Microsoft YaHei">第${num}场</text>`;
                card += `<text x="${x0 + w - 5}" y="${y0 + h - 9}" font-size="7" fill="#cfe8d8" text-anchor="end" font-family="Microsoft YaHei">${fmtDate(m.date)}</text>`;

                // 队名
                const row1Y = y0 + h - 23;
                const row2Y = y0 + 8;

                function fitText(s, maxLen = 11) {
                    return s.length <= maxLen ? s : s.substring(0, maxLen - 1) + '…';
                }

                card += `<text x="${x0 + 8}" y="${row1Y}" font-size="10.5" fill="white" font-family="Microsoft YaHei">${fitText(l1)}</text>`;
                card += `<text x="${x0 + 8}" y="${row2Y}" font-size="10.5" fill="white" font-family="Microsoft YaHei">${fitText(l2)}</text>`;

                // 比分
                if (done) {
                    card += `<text x="${x0 + w - 8}" y="${row1Y}" font-size="11" fill="#ffd700" font-weight="bold" text-anchor="end" font-family="Microsoft YaHei">${sc1}</text>`;
                    card += `<text x="${x0 + w - 8}" y="${row2Y}" font-size="11" fill="#ffd700" font-weight="bold" text-anchor="end" font-family="Microsoft YaHei">${sc2}</text>`;
                } else {
                    card += `<text x="${x0 + w - 8}" y="${row1Y}" font-size="9" fill="#cfe8d8" text-anchor="end" font-family="Microsoft YaHei">-</text>`;
                    card += `<text x="${x0 + w - 8}" y="${row2Y}" font-size="9" fill="#cfe8d8" text-anchor="end" font-family="Microsoft YaHei">-</text>`;
                }

                // 备注
                if (note) {
                    card += `<text x="${cx}" y="${y0 - 9}" font-size="7" fill="#ffed4e" text-anchor="middle" font-family="Microsoft YaHei">${note}</text>`;
                }

                card += `</g>`;
                return card;
            }

            // 连接线函数
            function connector(x1, y1, x2, y2) {
                const midX = (x1 + x2) / 2;
                return `<path d="M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}" stroke="#5fae7a" stroke-width="1.2" fill="none"/>`;
            }

            // 计算y坐标
            const n = 8;
            const slotH = usableH / n;
            const yPositionsR32 = [];
            for (let i = 0; i < n; i++) {
                yPositionsR32[i] = svgHeight - bottomMargin - slotH * (i + 0.5);
            }

            function pairY(positions) {
                const result = [];
                for (let i = 0; i < positions.length / 2; i++) {
                    result[i] = (positions[2 * i] + positions[2 * i + 1]) / 2;
                }
                return result;
            }

            // 绘制32强赛
            const leftR32 = r32.slice(0, 8);
            const rightR32 = r32.slice(8, 16);

            leftR32.forEach((m, i) => {
                svg += drawMatchCard(colX[0], yPositionsR32[i], m);
            });
            rightR32.forEach((m, i) => {
                svg += drawMatchCard(colXRight[0], yPositionsR32[i], m);
            });

            // 16强赛
            const yR16 = pairY(yPositionsR32);
            const leftR16 = r16.slice(0, 4);
            const rightR16 = r16.slice(4, 8);

            leftR16.forEach((m, i) => {
                svg += connector(colX[0] + cardW / 2, yPositionsR32[2 * i], colX[1] - cardW / 2, yR16[i]);
                svg += connector(colX[0] + cardW / 2, yPositionsR32[2 * i + 1], colX[1] - cardW / 2, yR16[i]);
                svg += drawMatchCard(colX[1], yR16[i], m);
            });
            rightR16.forEach((m, i) => {
                svg += connector(colXRight[0] - cardW / 2, yPositionsR32[2 * i], colXRight[1] + cardW / 2, yR16[i]);
                svg += connector(colXRight[0] - cardW / 2, yPositionsR32[2 * i + 1], colXRight[1] + cardW / 2, yR16[i]);
                svg += drawMatchCard(colXRight[1], yR16[i], m);
            });

            // 8强赛
            const yQF = pairY(yR16);
            const leftQF = qf.slice(0, 2);
            const rightQF = qf.slice(2, 4);

            leftQF.forEach((m, i) => {
                svg += connector(colX[1] + cardW / 2, yR16[2 * i], colX[2] - cardW / 2, yQF[i]);
                svg += connector(colX[1] + cardW / 2, yR16[2 * i + 1], colX[2] - cardW / 2, yQF[i]);
                svg += drawMatchCard(colX[2], yQF[i], m);
            });
            rightQF.forEach((m, i) => {
                svg += connector(colXRight[1] - cardW / 2, yR16[2 * i], colXRight[2] + cardW / 2, yQF[i]);
                svg += connector(colXRight[1] - cardW / 2, yR16[2 * i + 1], colXRight[2] + cardW / 2, yQF[i]);
                svg += drawMatchCard(colXRight[2], yQF[i], m);
            });

            // 半决赛
            const ySF = pairY(yQF);
            if (sf[0]) {
                svg += connector(colX[2] + cardW / 2, yQF[0], colX[3] - cardW / 2, ySF[0]);
                svg += connector(colX[2] + cardW / 2, yQF[1], colX[3] - cardW / 2, ySF[0]);
                svg += drawMatchCard(colX[3], ySF[0], sf[0]);
            }
            if (sf[1]) {
                svg += connector(colXRight[2] - cardW / 2, yQF[0], colXRight[3] + cardW / 2, ySF[0]);
                svg += connector(colXRight[2] - cardW / 2, yQF[1], colXRight[3] + cardW / 2, ySF[0]);
                svg += drawMatchCard(colXRight[3], ySF[0], sf[1]);
            }

            // 决赛
            if (final) {
                const finalY = ySF[0];
                svg += connector(colX[3] + cardW / 2, ySF[0], finalX - (cardW + 20) / 2, finalY);
                svg += connector(colXRight[3] - cardW / 2, ySF[0], finalX + (cardW + 20) / 2, finalY);
                svg += drawMatchCard(finalX, finalY, final, cardW + 20, cardH + 12);
                svg += `<text x="${finalX}" y="${finalY + cardH / 2 + 28}" font-size="13" fill="#ffd700" font-weight="bold" text-anchor="middle" font-family="Microsoft YaHei">🏆 决赛</text>`;
            }

            // 季军赛
            if (third && final) {
                const thirdY = ySF[0] - 140;
                svg += drawMatchCard(finalX, thirdY, third);
                svg += `<text x="${finalX}" y="${thirdY + cardH / 2 + 14}" font-size="11" fill="#cfe8d8" text-anchor="middle" font-family="Microsoft YaHei">季军赛</text>`;
            }

            // 轮次标签
            const roundLabels = ['32强赛', '16强赛', '8强赛', '半决赛'];
            const labelY = svgHeight - 95;
            for (let i = 0; i < 4; i++) {
                svg += `<text x="${colX[i]}" y="${labelY}" font-size="13" fill="#ffed4e" font-weight="bold" text-anchor="middle" font-family="Microsoft YaHei">${roundLabels[i]}</text>`;
                svg += `<line x1="${colX[i] - 25}" y1="${labelY - 8}" x2="${colX[i] + 25}" y2="${labelY - 8}" stroke="#ffed4e" stroke-width="1"/>`;
                svg += `<text x="${colXRight[i]}" y="${labelY}" font-size="13" fill="#ffed4e" font-weight="bold" text-anchor="middle" font-family="Microsoft YaHei">${roundLabels[i]}</text>`;
                svg += `<line x1="${colXRight[i] - 25}" y1="${labelY - 8}" x2="${colXRight[i] + 25}" y2="${labelY - 8}" stroke="#ffed4e" stroke-width="1"/>`;
            }

            // 底部说明
            svg += `<text x="${svgWidth / 2}" y="18" font-size="9" fill="#cfe8d8" text-anchor="middle" font-family="Microsoft YaHei">注：'第N场胜者/负者' 表示该位置由对应场次比赛结果决定，尚未产生具体球队</text>`;

            svg += `</svg>`;

            container.innerHTML = svg;
        }
    </script>
