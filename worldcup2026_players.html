<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0a4d2e 0%, #1a7a3e 50%, #0f5c35 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            animation: fadeInDown 1s;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            color: #ffd700;
        }

        .team-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .team-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .team-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .team-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-color: #ffd700;
            color: #000;
            font-weight: bold;
        }

        .pitch-container {
            background: linear-gradient(180deg,
                rgba(10, 120, 50, 0.9) 0%,
                rgba(15, 100, 45, 0.9) 50%,
                rgba(10, 120, 50, 0.9) 100%);
            border-radius: 20px;
            padding: 40px;
            margin: 30px auto;
            max-width: 900px;
            position: relative;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .pitch-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
        }

        .pitch-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .formation-title {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .pitch-line {
            display: flex;
            justify-content: space-around;
            margin: 40px 0;
            position: relative;
            z-index: 1;
        }

        .player-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5));
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px 20px;
            text-align: center;
            min-width: 160px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            position: relative;
            animation: playerEntrance 0.8s ease-out;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .player-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            color: #000;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            overflow: hidden;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-avatar-fallback {
            font-size: 1.8em;
            font-weight: bold;
            color: #000;
        }

        .player-name-en {
            font-size: 0.75em;
            color: #888;
            margin-top: 3px;
            font-style: italic;
        }

        .player-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
            border-color: #fff;
        }

        .player-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .player-name {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .player-position {
            font-size: 0.9em;
            color: #aaa;
            text-transform: uppercase;
        }

        .player-club {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }

        .team-info {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin: 30px auto;
            max-width: 900px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .team-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .match-preview {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin: 30px auto;
            max-width: 1200px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .match-preview h2 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 25px;
            font-size: 2em;
        }

        .vs-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
        }

        .team-preview {
            text-align: center;
            flex: 1;
        }

        .team-flag {
            font-size: 5em;
            margin-bottom: 15px;
        }

        .team-name-large {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }

        .vs-text {
            font-size: 3em;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes playerEntrance {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .gk { background: #ff6b6b; }
        .def { background: #4ecdc4; }
        .mid { background: #45b7d1; }
        .fwd { background: #f9ca24; }
    </style>

        const imageCache = {};

        async function fetchWikiImage(playerName) {
            if (imageCache[playerName]) return imageCache[playerName];
            const title = wikiTitles[playerName];
            if (!title) {
                console.log(`❌ 未找到维基标题: ${playerName}`);
                return null;
            }
            try {
                const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=250&format=json&origin=*&redirects=1`;
                const res = await fetch(url);
                const data = await res.json();
                const pages = data.query.pages;
                for (const page of Object.values(pages)) {
                    const src = page?.thumbnail?.source;
                    if (src) {
                        imageCache[playerName] = src;
                        console.log(`✅ 成功加载: ${playerName} - ${title}`);
                        return src;
                    }
                }
                console.log(`⚠️ 无照片: ${playerName} - ${title}`);
            } catch(e) {
                console.log(`❌ 加载失败: ${playerName} - ${e.message}`);
            }
            return null;
        }

        async function loadAvatars() {
            const imgs = document.querySelectorAll('.player-avatar img[data-player]');
            console.log(`🔄 开始加载 ${imgs.length} 个球员头像...`);

            // 逐个加载，每次请求间隔 300ms，避免 429 错误
            for (const img of imgs) {
                const name = img.getAttribute('data-player');
                const src = await fetchWikiImage(name);
                if (src) {
                    img.src = src;
                    img.style.display = '';
                    img.onload = () => img.parentElement.classList.add('loaded');
                    img.onerror = () => {
                        img.parentElement.style.background = 'linear-gradient(135deg,#ffd700,#ffed4e)';
                        img.style.display = 'none';
                        img.parentElement.classList.add('loaded');
                    };
                } else {
                    img.parentElement.style.background = 'linear-gradient(135deg,#ffd700,#ffed4e)';
                    img.style.display = 'none';
                    img.parentElement.classList.add('loaded');
                }
                // 延迟 300ms 再加载下一个球员，避免请求过快
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            console.log(`✅ 头像加载完成`);
        }

        // 初始化显示西班牙
        window.onload = async () => {
            showTeam('spain');
            await loadAvatars();
        };
